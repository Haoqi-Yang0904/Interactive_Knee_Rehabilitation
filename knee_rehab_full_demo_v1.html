<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>膝关节交互式康复系统 Demo</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f5fbf8;
      --ink: #073f3c;
      --muted: #7a9490;
      --line: #e8f2ef;
      --lime: #d9ff67;
      --green: #22c08a;
      --teal: #006e71;
      --pale: #eaffcc;
      --card: #ffffff;
      --shadow: 0 22px 55px rgba(0, 70, 65, 0.10);
      --radius: 26px;
      --danger: #cc5e5b;
      --warn: #e0aa4f;
      --blue: #3987e8;
    }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 80% 0%, #e0fff3 0, transparent 34%), var(--bg);
    }
    button, input, select, textarea { font-family: inherit; }
    button { user-select: none; }

    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px;
      background: radial-gradient(circle at 8% 10%, rgba(217,255,103,0.36), transparent 28%), radial-gradient(circle at 88% 0%, rgba(16,183,143,0.24), transparent 34%), var(--bg);
    }
    .login-card {
      width: min(1060px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      background: rgba(255,255,255,0.94);
      border-radius: 38px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(232,242,239,0.8);
    }
    .login-hero {
      padding: 54px;
      background: linear-gradient(135deg, rgba(217,255,103,0.88), rgba(16,183,143,0.86));
      position: relative;
      min-height: 590px;
      color: #063e3a;
    }
    .login-hero h1 { font-size: 46px; line-height: 1.12; margin: 0 0 18px; letter-spacing: -1px; }
    .login-hero p { font-size: 18px; line-height: 1.8; margin: 0; max-width: 520px; color: rgba(6,62,58,0.78); }
    .hero-badges { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 34px; }
    .hero-badge { padding: 10px 14px; border-radius: 999px; background: rgba(255,255,255,0.48); font-weight: 800; }
    .hero-panel {
      position: absolute; left: 54px; right: 54px; bottom: 46px;
      border-radius: 28px;
      background: rgba(255,255,255,0.36);
      backdrop-filter: blur(8px);
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .hero-stat { background: rgba(255,255,255,0.5); border-radius: 22px; padding: 16px; }
    .hero-stat span { display: block; color: rgba(6,62,58,0.62); font-size: 13px; margin-bottom: 8px; }
    .hero-stat strong { font-size: 25px; }
    .login-form-wrap { padding: 48px; }
    .login-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f2fbf8; border-radius: 20px; padding: 6px; margin-bottom: 26px; }
    .login-tab { border: none; border-radius: 16px; height: 44px; background: transparent; color: var(--muted); font-weight: 900; cursor: pointer; }
    .login-tab.active { background: #fff; color: var(--teal); box-shadow: 0 8px 20px rgba(0,70,65,0.06); }
    .form-title { font-size: 30px; font-weight: 900; margin-bottom: 8px; }
    .form-sub { color: var(--muted); line-height: 1.7; margin-bottom: 22px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-weight: 800; margin-bottom: 8px; }
    .field input, .field select {
      width: 100%; height: 48px; border-radius: 18px; border: 1px solid var(--line); outline: none;
      padding: 0 15px; color: var(--ink); background: #fff; font-size: 15px;
    }
    .login-btn { width: 100%; height: 50px; border: none; border-radius: 999px; background: linear-gradient(135deg, #d8ff67, #13be8f); color: #073f3c; font-weight: 900; cursor: pointer; box-shadow: 0 12px 26px rgba(19,190,143,0.22); margin-top: 8px; }
    .link-btn { border: none; background: transparent; color: #0b817c; font-weight: 900; cursor: pointer; padding: 0; }
    .demo-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 18px 0; }
    .demo-actions button { border: 1px solid #caf3e6; border-radius: 18px; background: #e9fff7; color: #0b817c; padding: 12px 10px; font-weight: 900; cursor: pointer; }
    .hint-box { border-radius: 18px; padding: 13px 14px; background: #f8fffc; color: var(--muted); font-size: 13px; line-height: 1.7; }

    .app { width: min(1480px, 100vw); min-height: 930px; margin: 0 auto; display: none; grid-template-columns: 94px 1fr; gap: 0; padding: 34px 38px 38px 26px; }
    .sidebar { background: rgba(255,255,255,0.82); border-radius: 34px; box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 22px; min-height: 850px; position: sticky; top: 28px; }
    .logo { width: 48px; height: 48px; border-radius: 18px; background: linear-gradient(135deg, #e5ff88, #10b78f); display: grid; place-items: center; font-size: 25px; box-shadow: 0 12px 28px rgba(16,183,143,0.26); margin-bottom: 20px; user-select: none; }
    .nav-item { width: 42px; height: 42px; border: none; border-radius: 16px; display: grid; place-items: center; color: #9ab1ad; background: transparent; font-size: 21px; position: relative; cursor: pointer; transition: 0.18s ease; }
    .nav-item:hover { background: #f2fffb; color: #0b817c; }
    .nav-item.active { background: #e9fff7; color: #0b817c; }
    .nav-item.active::after { content: ""; position: absolute; right: -12px; top: 11px; height: 20px; width: 4px; border-radius: 10px; background: #14b995; }
    .nav-spacer { flex: 1; }
    .content { padding-left: 44px; min-width: 0; }
    .view { display: none; }
    .view.active { display: block; }

    .header { display: grid; grid-template-columns: 1fr 390px; align-items: start; margin: 34px 0 26px; gap: 24px; }
    h1 { margin: 0; font-size: 44px; letter-spacing: -1px; line-height: 1.12; }
    .subtitle { margin-top: 12px; color: var(--muted); font-size: 17px; }
    .search { background: #fff; height: 54px; border-radius: 22px; display: flex; align-items: center; padding: 0 22px; color: #9ab1ad; box-shadow: 0 14px 32px rgba(0, 60, 55, 0.06); margin-top: 4px; gap: 10px; position: relative; }
    .search input { border: none; outline: none; width: 100%; color: var(--ink); font-size: 15px; background: transparent; }
    .search-results { position: absolute; top: 64px; left: 0; right: 0; background: #fff; border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); padding: 10px; z-index: 20; display: none; max-height: 360px; overflow: auto; }
    .search-results.active { display: block; }
    .search-row { width: 100%; border: none; background: #fff; padding: 12px; border-radius: 16px; display: grid; grid-template-columns: 42px 1fr; gap: 12px; text-align: left; cursor: pointer; align-items: center; }
    .search-row:hover { background: #f7fffb; }
    .search-row-title { font-weight: 900; margin-bottom: 4px; }
    .search-row-sub { color: var(--muted); font-size: 12px; }

    .grid { display: grid; grid-template-columns: minmax(720px, 1fr) 380px; gap: 34px; align-items: start; }
    .history { display: flex; flex-direction: column; gap: 18px; }
    .day-card { min-height: 120px; border: none; border-radius: var(--radius); padding: 18px 28px 18px 18px; display: grid; grid-template-columns: 82px repeat(4, minmax(116px, 1fr)); column-gap: 28px; align-items: center; color: #073f3c; box-shadow: var(--shadow); overflow: hidden; position: relative; cursor: pointer; text-align: left; transition: transform 0.18s ease, box-shadow 0.18s ease; }
    .day-card:hover { transform: translateY(-2px); box-shadow: 0 26px 60px rgba(0, 70, 65, 0.14); }
    .day-card::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(255,255,255,0.40), transparent 48%); pointer-events: none; }
    .date-chip { width: 66px; height: 78px; border-radius: 18px 26px 26px 18px; background: rgba(255,255,255,0.88); color: #073f3c; display: grid; place-items: center; font-weight: 700; box-shadow: 0 12px 24px rgba(0,0,0,0.06); z-index: 1; }
    .date-chip span { display:block; color:#8aa49f; font-weight: 600; font-size: 13px; text-align:center; }
    .date-chip strong { display:block; font-size: 28px; line-height: 1.05; text-align:center; }
    .metric { z-index: 1; min-width: 0; }
    .metric .label { font-size: 15px; opacity: 0.86; margin-bottom: 8px; white-space: nowrap; }
    .metric .value { font-size: 28px; font-weight: 900; white-space: nowrap; }
    .metric-tip { font-size: 13px; opacity: 0.74; margin-top: 6px; white-space: nowrap; }

    .panel, .soft-card { background: rgba(255,255,255,0.9); border-radius: 30px; box-shadow: var(--shadow); padding: 26px; border: 1px solid rgba(232,242,239,0.72); }
    .panel h2, .soft-card h2 { margin: 0 0 22px; font-size: 27px; }
    .chart-wrap { height: 230px; position: relative; }
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; color: var(--muted); font-size: 13px; }
    .legend i { display: inline-block; width: 18px; height: 4px; border-radius: 99px; vertical-align: middle; margin-right: 5px; }
    .main-l { background: #004f57; } .num-l { background: #17c291; } .quality-l { background: #d8ff67; }
    .bottom { margin-top: 30px; display: grid; grid-template-columns: 1fr; }
    .plan-card { background: rgba(255,255,255,0.94); border-radius: 32px; box-shadow: var(--shadow); padding: 26px 30px 30px; border: 1px solid rgba(232,242,239,0.72); }
    .plan-head { display: grid; grid-template-columns: 1fr 300px; align-items: center; margin-bottom: 18px; }
    .plan-head h2 { margin: 0; font-size: 30px; }
    .progress-total { display: flex; gap: 12px; align-items: center; justify-content: flex-end; color: var(--muted); font-size: 15px; }
    .bar-bg { width: 150px; height: 9px; border-radius: 99px; background: #e8f2ef; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #d8ff67, #10b98d); width: 56%; }
    .plan-grid, .action-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .exercise { border: 1px solid var(--line); border-radius: 24px; padding: 17px 18px; display: grid; grid-template-columns: 52px 1fr 112px; gap: 14px; align-items: center; background: linear-gradient(180deg, #ffffff, #f8fffc); min-height: 86px; }
    .exercise.quick-start { grid-column: 1 / -1; background: linear-gradient(135deg, rgba(217,255,103,0.26), rgba(16,183,143,0.13)); }
    .exercise .icon, .record-icon, .search-icon { width: 52px; height: 52px; border-radius: 18px; background: #e9fff7; display:grid; place-items:center; font-size: 23px; overflow: hidden; }
    .record-icon, .search-icon { width: 42px; height: 42px; border-radius: 15px; }
    svg.rehab-icon { width: 39px; height: 39px; display: block; overflow: visible; }
    .rehab-icon .leg { fill: none; stroke: #006e71; stroke-width: 6.2; stroke-linecap: round; stroke-linejoin: round; }
    .rehab-icon .bed { fill: none; stroke: #b8d7d0; stroke-width: 4.2; stroke-linecap: round; }
    .rehab-icon .accent, .rehab-icon .press { fill: none; stroke: #20bd8f; stroke-width: 4.2; stroke-linecap: round; stroke-linejoin: round; }
    .rehab-icon .press { stroke: #d8ff67; }
    .rehab-icon .accent.thin { stroke-width: 3.2; }
    .rehab-icon .dot { fill: #20bd8f; }
    .ex-title { font-size: 18px; font-weight: 900; margin-bottom: 6px; }
    .ex-sub { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .btn { border: none; cursor: pointer; background: linear-gradient(135deg, #d8ff67, #13be8f); color: #073f3c; min-height: 42px; border-radius: 999px; font-weight: 900; box-shadow: 0 11px 22px rgba(19,190,143,0.22); padding: 0 16px; }
    .btn.secondary { background: #e9fff7; color: #0b817c; box-shadow: none; border: 1px solid #caf3e6; }
    .btn.dark { background: #093f3c; color: #fff; }
    .btn.warn { background: #fff2e4; color: #b45e00; box-shadow: none; border: 1px solid #ffe0bd; }
    .btn.danger { background: #fff0ef; color: #b84b49; box-shadow: none; border: 1px solid #ffd1cf; }

    .page-head { margin: 34px 0 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
    .page-head h1 { font-size: 42px; }
    .page-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .back-btn, .month-btn { border: none; border-radius: 999px; background: #fff; color: #0b817c; box-shadow: 0 12px 28px rgba(0, 70, 65, 0.08); cursor: pointer; font-weight: 900; }
    .back-btn { padding: 12px 18px; }
    .month-btn { width: 42px; height: 42px; font-size: 22px; }
    .calendar-card, .detail-card, .account-card { background: rgba(255,255,255,0.94); border-radius: 32px; box-shadow: var(--shadow); padding: 30px; border: 1px solid rgba(232,242,239,0.72); }
    .month-control { display: flex; align-items: center; justify-content: center; gap: 22px; margin: 2px 0 28px; }
    .month-title { font-size: 30px; font-weight: 900; min-width: 250px; text-align: center; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 12px; }
    .weekday { color: var(--muted); font-size: 15px; font-weight: 900; text-align: center; padding: 8px 0 12px; }
    .calendar-day { min-height: 104px; border: 1px solid #e8f2ef; border-radius: 22px; background: #fff; color: var(--ink); display: flex; flex-direction: column; align-items: flex-start; justify-content: space-between; padding: 14px 16px; text-align: left; position: relative; transition: 0.18s ease; }
    .calendar-day.outside { opacity: 0.30; }
    .calendar-day.has-plan, .calendar-day.has-record { cursor: pointer; }
    .calendar-day.has-plan { border: 1px dashed rgba(20,185,149,0.45); background: linear-gradient(135deg, #ffffff, #f2fffb); }
    .calendar-day.has-record { border: none; box-shadow: 0 12px 28px rgba(19,190,143,0.12); }
    .calendar-day.has-plan:hover, .calendar-day.has-record:hover { transform: translateY(-2px); }
    .calendar-day .date-num { font-size: 26px; font-weight: 900; }
    .day-tags { display: flex; gap: 8px; flex-wrap: nowrap; align-items: center; max-width: 100%; }
    .record-tag, .plan-tag, .extra-tag { font-size: 12px; padding: 5px 9px; border-radius: 999px; font-weight: 900; white-space: nowrap; flex: 0 0 auto; }
    .record-tag { background: rgba(20,185,149,0.12); color: #0b817c; }
    .plan-tag { background: rgba(0,110,113,0.08); color: #006e71; }
    .extra-tag { background: rgba(57,135,232,0.10); color: #3576ce; }
    .score-mini { font-size: 12px; color: var(--muted); }

    .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; margin-bottom: 24px; }
    .summary-box { background: linear-gradient(180deg, #ffffff, #f8fffc); border: 1px solid var(--line); border-radius: 24px; padding: 20px; }
    .summary-box .label { color: var(--muted); font-size: 14px; margin-bottom: 10px; }
    .summary-box .value { font-size: 28px; font-weight: 900; }
    .detail-layout { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; align-items: stretch; }
    .prescription-box, .record-list, .analysis-box { height: 100%; }
    .record-list, .analysis-box, .prescription-box { background: #fff; border: 1px solid var(--line); border-radius: 28px; padding: 22px; }
    .record-list h2, .analysis-box h2, .prescription-box h2 { margin: 0 0 18px; font-size: 24px; }
    .record-row { display: grid; grid-template-columns: 44px 1fr minmax(150px, 190px); align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--line); }
    .record-row:last-child { border-bottom: none; }
    .record-name { font-weight: 900; font-size: 17px; margin-bottom: 4px; }
    .record-desc { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .record-result { text-align: right; font-weight: 900; font-size: 17px; }
    .analysis-item { border-radius: 20px; background: #f8fffc; padding: 16px; margin-bottom: 14px; border: 1px solid var(--line); }
    .analysis-item strong { display: block; font-size: 17px; margin-bottom: 8px; }
    .analysis-item p { margin: 0; color: var(--muted); line-height: 1.62; font-size: 14px; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 0; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 999px; background: #e9fff7; color: #0b817c; font-size: 12px; font-weight: 900; }
    .action-detail-grid { display: grid; grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr); gap: 22px; align-items: start; }
    .action-intro { background: rgba(255,255,255,0.94); border-radius: 32px; box-shadow: var(--shadow); padding: 28px; border: 1px solid rgba(232,242,239,0.72); }
    .action-title-row { display: grid; grid-template-columns: 64px 1fr; gap: 16px; align-items: center; margin-bottom: 20px; }
    .action-title-row .icon { width: 64px; height: 64px; border-radius: 22px; background: #e9fff7; display: grid; place-items: center; }
    .action-title-row h2 { margin: 0 0 6px; font-size: 30px; }
    .action-subtitle { color: var(--muted); font-size: 14px; }
    .intro-paragraph { color: #375e5a; line-height: 1.85; font-size: 16px; margin: 0 0 20px; }
    .standard-list { display: grid; gap: 10px; }
    .standard-item { border-radius: 18px; background: #f8fffc; border: 1px solid var(--line); padding: 13px 14px; color: var(--muted); line-height: 1.55; }
    .standard-item strong { color: var(--ink); }
    .media-grid { display: grid; grid-template-columns: 1fr; grid-template-rows: repeat(2, minmax(0, 1fr)); gap: 18px; height: 100%; min-height: 690px; }
    .media-box { min-height: 330px; border-radius: 30px; background: linear-gradient(135deg, #052f33, #0a6f6b); overflow: hidden; color: #fff; position: relative; box-shadow: var(--shadow); display: grid; place-items: center; padding: 24px; }
    .media-box.camera { background: linear-gradient(135deg, #092f36, #135d6f); }
    .media-box .media-label { position: absolute; left: 20px; top: 18px; background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.20); border-radius: 999px; padding: 8px 12px; font-size: 13px; font-weight: 900; }
    .camera-stream { width: 100%; height: 100%; object-fit: contain; border-radius: 20px; background: #031f24; }
    video.camera-stream { display: block; }
    .media-controls { position: absolute; right: 18px; top: 18px; display: flex; gap: 8px; align-items: center; }
    .media-control-btn { border: none; border-radius: 999px; padding: 8px 11px; font-weight: 900; color: #063e3a; background: rgba(255,255,255,0.92); cursor: pointer; }
    .recognition-status { position: absolute; left: 20px; bottom: 18px; right: 20px; color: rgba(255,255,255,0.82); font-size: 13px; line-height: 1.5; text-align: left; }
    .demo-tv-btn { width: 78px; height: 54px; border: none; border-radius: 16px; background: rgba(255,255,255,0.66); box-shadow: 0 10px 28px rgba(0,0,0,0.20); cursor: pointer; display: grid; place-items: center; margin: 0 auto; opacity: 0.82; transition: opacity 0.16s ease, background 0.16s ease; }
    .demo-tv-btn:hover { background: rgba(255,255,255,0.84); opacity: 0.96; }
    .demo-tv-btn::before { content: ""; width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 19px solid rgba(5,47,51,0.62); margin-left: 4px; }
    .demo-video-playing { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.18), rgba(0,0,0,0.10) 34%, rgba(0,0,0,0.20)); text-align: center; padding: 32px; }
    .demo-video-playing strong { font-size: 24px; display: block; margin-top: 14px; }
    .demo-video-playing p { color: rgba(255,255,255,0.74); margin: 8px 0 0; }
    .media-placeholder { text-align: center; max-width: 420px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .media-placeholder .big { font-size: 54px; display: block; margin-bottom: 12px; }
    .media-placeholder strong { display: block; font-size: 22px; margin-bottom: 8px; }
    .media-placeholder p { margin: 0; color: rgba(255,255,255,0.72); line-height: 1.6; }
    .fullscreen-btn { position: absolute; right: 18px; bottom: 18px; border: none; border-radius: 999px; background: rgba(255,255,255,0.92); color: #063e3a; padding: 10px 14px; font-weight: 900; cursor: pointer; opacity: 0; transform: translateY(6px); transition: 0.18s ease; }
    .media-box:hover .fullscreen-btn { opacity: 1; transform: translateY(0); }
    .media-box:fullscreen { border-radius: 0; width: 100vw; height: 100vh; }
    .media-box:fullscreen .fullscreen-btn { opacity: 1; transform: translateY(0); }

    .account-layout { display: grid; grid-template-columns: 220px 1fr; gap: 26px; align-items: center; }
    .avatar { width: 160px; height: 160px; border-radius: 44px; display: grid; place-items: center; background: linear-gradient(135deg, #dfff69, #10b78f); font-size: 72px; box-shadow: 0 20px 50px rgba(16,183,143,0.22); margin: 0 auto; }
    .account-info h2 { margin: 0 0 10px; font-size: 32px; }
    .status-pill { display: inline-flex; align-items: center; gap: 8px; padding: 9px 13px; background: #e9fff7; color: #0b817c; border-radius: 999px; font-weight: 900; margin: 12px 0 22px; }
    .status-pill.logged-out { color: var(--danger); background: #fff1f2; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #14b995; }
    .logged-out .dot { background: var(--danger); }

    .patient-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .patient-card { border: 1px solid var(--line); background: #fff; border-radius: 28px; padding: 20px; cursor: pointer; transition: 0.18s ease; text-align: left; }
    .patient-card:hover, .patient-card.active { transform: translateY(-2px); box-shadow: 0 20px 46px rgba(0,70,65,0.08); border-color: #bfeee2; }

    .assign-field input, .assign-field select { width:100%; height:46px; border-radius:18px; border:1px solid var(--line); background:#fff; color:var(--ink); padding:0 14px; outline:none; font-weight:800; }

    async function apiRequest(path, options = {}) {
      const headers = { ...(options.headers || {}) };
      let body = options.body;
      if (body !== undefined && !(body instanceof FormData) && typeof body !== 'string') {
        headers['Content-Type'] = 'application/json';
        body = JSON.stringify(body);
      }
      if (apiToken) headers.Authorization = `Bearer ${apiToken}`;
      const res = await fetch(path, { cache: 'no-store', ...options, headers, body });
      const payload = await res.json().catch(() => ({}));
      if (!res.ok || payload.ok === false) throw new Error(payload.error || res.statusText || '本地 API 请求失败');
      return payload.data;
    }

      }
      if (trainingPeerConnection) {

        });
        trainingPeerConnection.getReceivers().forEach(receiver => {

        });
        trainingPeerConnection.close();

    function hexToRgb(hex) {
      const h = hex.replace('#', '');
      return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
    }
    function rgbToHex(rgb) { return '#' + rgb.map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2,'0')).join(''); }
    function mix(c1, c2, t) { const a = hexToRgb(c1), b = hexToRgb(c2); return rgbToHex(a.map((v,i) => v * (1-t) + b[i] * t)); }
    function interpolateColor(score) {
      const stops = [
        { s: 0, c: '#bf6363' },
        { s: 60, c: '#df8a62' },
        { s: 75, c: '#e6d668' },
        { s: 88, c: '#99df64' },
        { s: 100, c: '#12b98c' }
      ];
      let left = stops[0], right = stops[stops.length - 1];
      for (let i = 0; i < stops.length - 1; i++) {
        if (score >= stops[i].s && score <= stops[i+1].s) { left = stops[i]; right = stops[i+1]; break; }
      }
      const t = right.s === left.s ? 0 : (score - left.s) / (right.s - left.s);
      return mix(left.c, right.c, t);
    }
    function scoreTheme(score, pale = false) {
      if (score == null) return { bg1: '#ffffff', bg2: '#f2fffb', text: '#073f3c', color: '#bfeee2' };
      const base = interpolateColor(score);
      const bg1 = pale ? mix(base, '#ffffff', 0.72) : mix(base, '#dfff69', score >= 85 ? 0.18 : 0.04);
      const bg2 = pale ? mix(base, '#ffffff', 0.84) : mix(base, '#006e71', score >= 88 ? 0.20 : 0.04);
      const text = score >= 88 ? '#ffffff' : '#073f3c';
      return { bg1, bg2, text, color: base };
    }

      const pScore = vals.map((r,i) => `${xs[i]},${y(r.score).toFixed(1)}`).join(' ');
      const pQty = vals.map((r,i) => `${xs[i]},${y(r.qty).toFixed(1)}`).join(' ');

    function renderCalendarGrid(patient, role) {

      return `<section class="page-head"><div><h1>${title}</h1><div class="subtitle">${role === 'therapist' ? `病人：${patient.name} · ` : ''}${plan ? plan.template : '暂无处方'}</div></div><div class="page-actions"><button class="back-btn" onclick="${back}">返回</button>${renderSearchBlock()}</div></section><section class="detail-card">${summary}<div class="detail-layout"><div class="prescription-box"><h2>当天训练处方</h2>${prescriptionRows}</div><div class="record-list"><h2>当天完成情况</h2>${results}</div></div><div class="detail-layout" style="margin-top:20px;"><div class="analysis-box"><h2>加总分析</h2><div class="analysis-item"><strong>数量动作</strong><p>${rec ? `踝泵、股四头肌等长收缩和腘绳肌等长收缩的综合达成率为 ${rec.qty}%。系统建议把数量动作拆分到上午、下午和晚上完成，避免一次性训练过久。` : '当天尚未训练，数量动作会按照处方目标记录完成次数。'}</p></div><div class="analysis-item"><strong>质量动作</strong><p>${rec ? `质量类动作平均得分为 ${rec.quality}%。系统会重点观察角度、保持时间和膝关节控制情况。` : '当天尚未训练，质量动作会在训练后记录最佳角度、保持时间和稳定性。'}</p></div>${extraRows}</div><div class="analysis-box"><h2>康复建议</h2><div class="analysis-item"><strong>下一步</strong><p>${nextStep}</p></div><div class="analysis-item"><strong>康复师建议</strong><p>${therapistAdvice}</p></div></div></div></section>`;

    function renderDemoVideoBox(actionId) {

    }
    function waitForIceGatheringComplete(pc, timeoutMs = 3000) {
      if (pc.iceGatheringState === 'complete') return Promise.resolve();
      return new Promise(resolve => {
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          pc.removeEventListener('icegatheringstatechange', onStateChange);
          clearTimeout(timer);
          resolve();
        };
        const onStateChange = () => {
          if (pc.iceGatheringState === 'complete') finish();
        };
        const timer = setTimeout(finish, timeoutMs);
        pc.addEventListener('icegatheringstatechange', onStateChange);
      });
    }
    function attachTrainingRemoteStream() {
      const video = document.getElementById('trainingWebrtcVideo');
      if (!video || !trainingRemoteStream) return;
      if (video.srcObject !== trainingRemoteStream) {
        video.srcObject = trainingRemoteStream;
      }
      video.play().catch(() => {});
    }
    function fallbackToMjpeg(reason) {
      if (!activeTraining || activeTraining.streamType !== 'webrtc' || activeTraining.webrtcFallbackUsed) return;
      if (activeTraining.receivingStopped) return;
      activeTraining.webrtcFallbackUsed = true;
      showToast(reason || 'WebRTC 连接失败，切换到 MJPEG 备用流');
      stopTrainingWebRTC({ intentional: true });
      if (!activeTraining?.fallbackStreamUrl) {
        showToast('没有可用的 MJPEG 备用流');
        return;
      }
      activeTraining.streamType = 'mjpeg_fallback';
      activeTraining.streamUrl = activeTraining.fallbackStreamUrl;
      latestTrainingStatus = { ...(latestTrainingStatus || {}), streamType: 'mjpeg_fallback' };
      const actionId = activeTraining.actionId || currentActionDetail?.actionId;
      if (actionId) {
        if (!refreshCameraBox(actionId)) openActionDetail(actionId, currentActionDetail?.source || 'plan');
      } else {
        renderCurrentSessionView();
      }
    }
    function handleWebRTCConnectionState(state) {
      updateWebRTCStatus(state);
      if (!activeTraining || activeTraining.streamType !== 'webrtc') return;
      if (state === 'connected') {
        trainingWebrtcConnectedAt = Date.now();
        return;
      }
      if (state === 'failed') {
        fallbackToMjpeg('WebRTC 连接失败，已切换到 MJPEG 备用流');
        return;
      }
      if (state === 'disconnected') {
        setTimeout(() => {
          if (activeTraining?.streamType === 'webrtc' && trainingPeerConnection?.connectionState === 'disconnected') {
            fallbackToMjpeg('WebRTC 连接中断超过 3 秒，已切换到 MJPEG 备用流');
          }
        }, 3000);
        return;
      }
      if (state === 'closed' && !trainingWebrtcIntentionalStop) {
        fallbackToMjpeg('WebRTC 连接已关闭，已切换到 MJPEG 备用流');
      }
    }
    async function startTrainingWebRTC(sessionInfo) {
      stopTrainingWebRTC({ intentional: true });
      if (!sessionInfo?.webrtcOfferUrl) throw new Error('WebRTC offer endpoint 不存在');
      const pc = new RTCPeerConnection({ iceServers: [] });
      trainingPeerConnection = pc;
      trainingWebrtcGotTrack = false;
      trainingWebrtcConnectedAt = null;
      trainingWebrtcStartedAt = Date.now();
      trainingWebrtcIntentionalStop = false;
      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.ontrack = event => {
        const [stream] = event.streams;
        trainingWebrtcGotTrack = true;
        trainingRemoteStream = stream;
        attachTrainingRemoteStream();
      };
      pc.onconnectionstatechange = () => handleWebRTCConnectionState(pc.connectionState);
      pc.oniceconnectionstatechange = () => {
        latestTrainingStatus = { ...(latestTrainingStatus || {}), webrtcIceConnectionState: pc.iceConnectionState };
        updateWebRTCStatus(pc.connectionState);
      };
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await waitForIceGatheringComplete(pc, 3000);
      const headers = { 'Content-Type': 'application/json' };
      if (apiToken) headers.Authorization = `Bearer ${apiToken}`;
      const resp = await fetch(sessionInfo.webrtcOfferUrl, {
        method: 'POST',
        headers,
        body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type })
      });
      const answer = await resp.json().catch(() => ({}));
      if (!resp.ok || answer.ok === false || !answer.sdp) {
        throw new Error(answer.error || 'WebRTC answer failed');
      }
      await pc.setRemoteDescription({ sdp: answer.sdp, type: answer.type || 'answer' });
      trainingWebrtcFallbackTimer = setTimeout(() => {
        if (!activeTraining || activeTraining.streamType !== 'webrtc') return;
        const status = latestTrainingStatus || {};
        const frameSeq = Number(status.frameSeq ?? status.frame_seq ?? 0);
        const clients = Number(status.webrtcClients ?? 0);
        if (!trainingWebrtcGotTrack || clients <= 0 || frameSeq <= 0) {
          fallbackToMjpeg('WebRTC 连接超时，已切换到 MJPEG 备用流');
        }
      }, 5000);
    }
    function updateWebRTCStatus(state) {
      const statusEl = document.getElementById('recognitionStatus');
      if (!statusEl) return;

    }
    function trainingStatusText(status = {}) {
      if (status.error) return `错误：${status.error}`;
      if (status.paused) return '已暂停';
      const streamType = status.streamType || activeTraining?.streamType || 'webrtc';
      const fps = streamType === 'webrtc' ? (status.webrtcTrackFps || status.processedFps || '--') : (status.fps ?? '--');
      const age = status.latestFrameAgeSeconds ?? '--';
      if (status.stale && streamType !== 'webrtc') return '实时画面暂未更新';
      let text = streamType === 'webrtc'
        ? `WebRTC 低延迟实时画面 · FPS ${fps} · 延迟 ${age}s`
        : `MJPEG 备用实时画面 · FPS ${fps} · 延迟 ${age}s`;
      if (status.webrtcConnectionState) text += ` · ${status.webrtcConnectionState}`;
      if (status.webrtcIceConnectionState) text += ` · ICE ${status.webrtcIceConnectionState}`;
      if (Number(status.fps || 0) > 0 && Number(status.fps || 0) < 8) {
        text += '<br>当前画面较卡，正在使用备用流或等待 WebRTC 恢复';

    function trainingMetricsText(status = {}) {
      const streamType = status.streamType || activeTraining?.streamType || 'webrtc';

      }

      const encode = status.encode_ms ?? '--';

          applyRemoteState(data.state);
          currentYear = Number(startDate.slice(0, 4));
          currentMonth = Number(startDate.slice(5, 7));
          showToast(`已为 ${p.name} 从 ${startDate} 起应用处方模板，共 ${pageSize} 天。`);
          showTherapistView('records');
          return;
        } catch (err) {
          showToast(err.message || '本地处方分配失败，已回退到前端模拟');
        }
      }
      const template = prescriptionTemplates[templateId] || prescriptionTemplates.straight_raise;
      for (let i = 0; i < pageSize; i++) {
        const date = addDays(startDate, i);
        p.prescriptions[date] = { date, template: template.name, actions: template.actions() };
      }
      currentYear = Number(startDate.slice(0, 4));
      currentMonth = Number(startDate.slice(5, 7));
      showToast(`已为 ${p.name} 从 ${startDate} 起应用 ${template.name}，共 ${pageSize} 天。`);
      showTherapistView('records');
    }
    function applyTemplate(name) { assignState.template = name; applyPrescriptionChanges(); }
    function mockEditPrescription(date) { showToast(`${date} 的处方调整入口已预留；真实版本可在弹窗中增删动作和目标。`); }
    function renderTherapistStats() {
      const p = patients[selectedPatientId];
      const records = Object.values(p.records).sort((a,b)=>a.date.localeCompare(b.date)).slice(-3);
      return `<section class="page-head"><div><h1>${p.name} 的康复统计</h1><div class="subtitle">查看过去三天的完成情况和过去一周的变化趋势。</div></div><div class="page-actions"><button class="back-btn" onclick="showTherapistView('patients')">切换病人</button></div></section><section class="grid"><div class="history">${records.map(record => renderDayCard(record, 'therapist_stats')).join('')}</div><aside class="panel"><h2>过去一周统计</h2><div class="chart-wrap">${renderWeekChart(p)}</div><div class="legend"><span><i class="main-l"></i>总分</span><span><i class="num-l"></i>数量套组</span><span><i class="quality-l"></i>质量套组</span></div></aside></section>`;
    }
    function renderTherapistSettings() {
      return `<section class="page-head"><div><h1>康复师账户设置</h1><div class="subtitle">查看当前康复师账号状态，也可以退出登录。</div></div></section><section class="account-card"><div class="account-layout"><div class="avatar">${session.avatar}</div><div class="account-info"><h2>${session.name}</h2><div class="ex-sub">账号：${session.username} · 类型：康复师账号 · 已管理病人 ${Object.keys(patients).length} 人</div><div class="status-pill"><span class="dot"></span>当前已登录</div><div><button class="btn dark" onclick="logout()">登出账户</button></div></div></div></section>`;
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.classList.remove('show'), 2600);
    }
  </script>
</body>
</html>
